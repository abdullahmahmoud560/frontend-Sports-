version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports-frontend
    restart: unless-stopped
    ports:
      - "3100:9000"  # نربط منفذ 9000 داخل الكونتينر بمنفذ 3100 على السيرفر
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: sports-frontend-nginx
    ports:
      - "80:80"  # نربط منفذ 80 داخل الكونتينر بمنفذ 80 على السيرفر
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
