version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: react-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react.rule=Host(`quattrogcc.ae`)"
      - "traefik.http.routers.react.entrypoints=http,https"
      - "traefik.http.routers.react.tls.certresolver=le"
      - "traefik.http.services.react.loadbalancer.server.port=80"
    networks:
      - webnet

networks:
  webnet:
    external: true  # Assuming Traefik الشبكة مرفوعة خارجيًا
